<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/images/icons8-ключ-liquid-glass-color-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/icons8-ключ-liquid-glass-color-16.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/images/icons8-ключ-liquid-glass-color-96.png">
  <link rel="icon" href="/images/favicon.ico" sizes="any">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text_message_encryption</title>
  <link rel="stylesheet" href="/src/style.css">
  <link rel="stylesheet" href="/src/reset.css">
</head>

<body>
  <div class="main_container">

    <div class="main_container-header">
      <h1 class="main_container-header-text font">
        Шифрование / расшифровка текста
      </h1>
    </div>

    <div class="input_field">
      <h2 class="input_field-heading font">Исходный текст</h2>
      <textarea name="input_field" id="input_field" class="input_field-textarea"></textarea>
    </div>

    <div class="settings_container">

      <div class="choosing_cipher">
        <h3 class="choosing_cipher-heading font">ШИФР</h3>
        <select name="select" id="select" class="choosing_cipher-select">
          <option value="caesar">Цезарь</option>
          <option value="atbash">Atbash</option>
        </select>
      </div>

      <div class="choosing_shift">
        <h3 class="choosing_shift-heading font">СДВИГ (ДЛЯ ЦЕЗАРЯ)</h3>
        <input type="number" name="shift" id="shift" min="1" max="33" class="choosing_shift-input">
      </div>

    </div>

    <div class="buttons_container">

      <button type="button" class="button-main font">«Зашифровать»</button>
      <button type="button" class="button-main font">«Расшифровать»</button>
      <button type="button" class="button-main font">«Сохранить»</button>
      <button type="button" class="button-main font">«Загрузить»</button>

    </div>

    <div class="result_container">

      <h4 class="result_container-heading font">Результат</h4>
      <div class="result_container-output">Ожидание результата...</div>

    </div>

  </div>

  <script type="module">

  </script>
</body>

</html>
